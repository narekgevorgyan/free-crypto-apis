name: Validate Links

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate-links:
    name: Check README links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate links
        run: npm run validate:links
